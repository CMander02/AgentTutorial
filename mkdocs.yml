site_name: Agent 新手教程
site_description: 面向新手的 Agent、Coding CLI、Skill、MCP 与 Obsidian 实战教程

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - 首页: index.md
  - 0. 写作启发:
      - inspiration/index.md
  - 1. 从零理解 Agent:
      - agent/index.md
      - Agent 是什么: agent/what-is-agent.md
      - Agent 形态演化: agent/forms.md
      - 当前主流入口: agent/current-mainstream.md
  - 2. 如何选择 Agent:
      - choose/index.md
      - 选型判断标准: choose/criteria.md
      - 购买前验证清单: choose/how-to-buy-us-services.md
  - 3. 开始之前:
      - pre-agent/index.md
  - 4. 第一次任务:
      - first-task/index.md
  - 5. Prompt 与计划:
      - prompt-plan/index.md
  - 6. 长任务与目标:
      - goal-running/index.md
  - 7. Skill 与 MCP:
      - skill-mcp/index.md
  - 8. 创建自己的 Skill:
      - create-skill/index.md
  - 9. Obsidian 实战:
      - practice-obsidian/index.md
  - FAQ: faq.md
