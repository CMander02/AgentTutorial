site_name: Agent 新手教程
site_description: 面向新手的 Agent、Coding CLI、Skill、MCP 与 Obsidian 实战教程

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - 首页: index.md
  - 00. 写作启发:
      - 00-inspiration/00-index.md
      - Linux 101 示例链接: 98-linux101-compat/00-index.md
  - 01. 从零理解 Agent:
      - 01-agent/00-index.md
      - Agent 是什么: 01-agent/01-what-is-agent.md
      - Agent 形态演化: 01-agent/02-forms.md
      - 当前主流入口: 01-agent/03-current-mainstream.md
  - 02. 如何选择 Agent:
      - 02-choose/00-index.md
      - 选型判断标准: 02-choose/01-criteria.md
      - 购买前验证清单: 02-choose/02-how-to-buy-us-services.md
  - 03. 开始之前:
      - 03-pre-agent/00-index.md
  - 04. 第一次任务:
      - 04-first-task/00-index.md
  - 05. Prompt 与计划:
      - 05-prompt-plan/00-index.md
  - 06. 长任务与目标:
      - 06-goal-running/00-index.md
  - 07. Skill 与 MCP:
      - 07-skill-mcp/00-index.md
  - 08. 创建自己的 Skill:
      - 08-create-skill/00-index.md
  - 09. Obsidian 实战:
      - 09-practice-obsidian/00-index.md
  - 99. FAQ: 99-faq.md
